<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>CAF Trainer PRO MAX</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 1100px;
  margin: auto;
  background: #f7f7f7;
}

header {
  text-align: center;
  padding: 15px;
}

nav {
  display: flex;
  gap: 5px;
  margin-bottom: 15px;
}

nav button {
  flex: 1;
  padding: 10px;
  border: none;
  cursor: pointer;
  background: #ddd;
}

nav button.active {
  background: #4a90e2;
  color: white;
}

section {
  display: none;
  background: white;
  padding: 15px;
  border-radius: 8px;
}

section.active {
  display: block;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
}

input, select {
  width: 100%;
  padding: 6px;
  margin: 4px 0;
}

button.action {
  margin-top: 10px;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
<h1>🧾 CAF TRAINER PRO MAX</h1>
<p>Simulatore ISEE + 730 per studio CAF</p>
</header>

<nav>
<button class="active" onclick="show(0)">👤 Anagrafica</button>
<button onclick="show(1)">🧮 ISEE</button>
<button onclick="show(2)">🧾 730</button>
</nav>

<!-- ANAGRAFICA -->
<section class="active">

<h2>📋 Nucleo familiare</h2>

<input id="nome" placeholder="Nome">
<select id="ruolo">
  <option value="titolare">Titolare DSU</option>
  <option value="coniuge">Coniuge</option>
  <option value="figlio">Figlio</option>
</select>

<input id="eta" type="number" placeholder="Età">
<select id="convivenza">
  <option value="si">Convivenza Sì</option>
  <option value="no">No</option>
</select>

<input id="reddito" type="number" placeholder="Reddito personale">
<input id="patrimonio" type="number" placeholder="Patrimonio personale">

<button class="action" onclick="addPerson()">➕ Aggiungi</button>

<table>
<thead>
<tr>
<th>Nome</th><th>Ruolo</th><th>Età</th><th>Reddito</th><th>Patrimonio</th>
</tr>
</thead>
<tbody id="people"></tbody>
</table>

</section>

<!-- ISEE -->
<section>

<h2>🧮 Simulazione ISEE</h2>

<button class="action" onclick="calcISEE()">Calcola ISEE</button>

<h3 id="iseeOut"></h3>

</section>

<!-- 730 -->
<section>

<h2>🧾 Simulazione 730</h2>

<input id="irpef" type="number" placeholder="IRPEF trattenuta">
<input id="spese" type="number" placeholder="Spese detraibili totali">

<button class="action" onclick="calc730()">Calcola 730</button>

<h3 id="out730"></h3>

</section>

<script>

/* =========================
   DATABASE
========================= */
let people = [];

/* =========================
   NAVIGATION
========================= */
function show(i){
  let sections=document.querySelectorAll("section");
  let buttons=document.querySelectorAll("nav button");

  sections.forEach((s,idx)=>{
    s.classList.toggle("active", idx===i);
    buttons[idx].classList.toggle("active", idx===i);
  });
}

/* =========================
   ANAGRAFICA
========================= */
function addPerson(){

let p = {
  nome: nome.value,
  ruolo: ruolo.value,
  eta: parseInt(eta.value)||0,
  convivenza: convivenza.value,
  reddito: parseFloat(reddito.value)||0,
  patrimonio: parseFloat(patrimonio.value)||0
};

people.push(p);
render();
clearForm();
}

function render(){

peopleBody.innerHTML = people.map(p=>
`<tr>
<td>${p.nome}</td>
<td>${p.ruolo}</td>
<td>${p.eta}</td>
<td>${p.reddito}</td>
<td>${p.patrimonio}</td>
</tr>`
).join("");
}

function clearForm(){
nome.value="";
eta.value="";
reddito.value="";
patrimonio.value="";
}

/* =========================
   ISEE ENGINE
========================= */
function calcISEE(){

let redditoTot = people.reduce((a,b)=>a+b.reddito,0);
let patTot = people.reduce((a,b)=>a+b.patrimonio,0);

let comp = people.length;

let scala = 1;
if(comp==2) scala=1.57;
else if(comp==3) scala=2.04;
else if(comp==4) scala=2.46;
else if(comp>=5) scala=2.85;

let isee = (redditoTot + patTot*0.2) / scala;

iseeOut.innerText = "ISEE simulato: € " + isee.toFixed(2);
}

/* =========================
   730 ENGINE
========================= */
function calc730(){

let irpefVal = parseFloat(irpef.value)||0;
let speseVal = parseFloat(spese.value)||0;

let det = speseVal * 0.19;

let imp = irpefVal - det;

out730.innerText =
imp>0
? "Debito: € " + imp.toFixed(2)
: "Credito: € " + Math.abs(imp).toFixed(2);

}

</script>

</body>
</html>
