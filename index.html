<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>CAF Trainer PRO - Casì + Pratica</title>

<style>
body { font-family: Arial; max-width: 1000px; margin:auto; background:#f5f5f5; }
.card { background:white; padding:15px; margin-top:10px; border-radius:8px; }
button { padding:10px; margin:5px; cursor:pointer; }
input, select { width:100%; padding:6px; margin:4px 0; }

.hidden { display:none; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th,td { border:1px solid #ccc; padding:6px; }

.step { display:none; }
.step.active { display:block; }

.bad { color:red; }
.good { color:green; }
</style>
</head>

<body>

<h1>🧾 CAF TRAINER PRO</h1>

<div class="card">

<!-- SELEZIONE MODALITÀ -->
<div id="menu">

<h2>Seleziona modalità</h2>

<button onclick="startCase()">🧠 Caso d’esame</button>
<button onclick="startPractice()">🧾 Pratica guidata</button>

</div>

<!-- AREA LAVORO -->
<div id="app" class="hidden">

<h3 id="modeTitle"></h3>

<div id="progress"></div>

<!-- STEP 1 -->
<div class="step active">
<h3>1. Nucleo familiare</h3>

<input id="nome" placeholder="Nome">
<select id="ruolo">
<option value="titolare">Titolare</option>
<option value="coniuge">Coniuge</option>
<option value="figlio">Figlio</option>
</select>

<input id="reddito" type="number" placeholder="Reddito">
<input id="patrimonio" type="number" placeholder="Patrimonio">

<button onclick="addPerson()">Aggiungi persona</button>

<table>
<thead><tr><th>Nome</th><th>Ruolo</th><th>Reddito</th><th>Patrimonio</th></tr></thead>
<tbody id="tab"></tbody>
</table>

<button onclick="next()">Avanti</button>
</div>

<!-- STEP 2 -->
<div class="step">
<h3>2. Documento</h3>

<div id="doc"></div>

<button onclick="next()">Avanti</button>
</div>

<!-- STEP 3 -->
<div class="step">
<h3>3. Controllo CAF</h3>

<div id="check"></div>

<button onclick="next()">Esito</button>
</div>

<!-- STEP 4 -->
<div class="step">
<h3>4. Esito finale</h3>

<h2 id="out"></h2>

</div>

</div>

</div>

<script>

/* =========================
   DATABASE
========================= */
let people = [];
let step = 0;
let mode = "";

/* =========================
   CASI PRECARICATI
========================= */
let cases = [
{
  nome:"Famiglia Rossi",
  people:[
    {nome:"Mario", ruolo:"titolare", reddito:20000, patrimonio:5000},
    {nome:"Anna", ruolo:"coniuge", reddito:0, patrimonio:0},
    {nome:"Luca", ruolo:"figlio", reddito:0, patrimonio:0}
  ],
  errori:"Manca reddito coniuge"
}
];

let currentCase = null;

/* =========================
   MODALITÀ
========================= */
function startCase(){
mode="case";
currentCase = cases[0];

people = JSON.parse(JSON.stringify(currentCase.people));

enterApp();
}

function startPractice(){
mode="practice";
people=[];
enterApp();
}

function enterApp(){
document.getElementById("menu").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

document.getElementById("modeTitle").innerText =
mode==="case" ? "🧠 Caso d’esame" : "🧾 Pratica guidata";

render();
showStep(0);
}

/* =========================
   NAV
========================= */
function next(){ step++; showStep(step); }

function showStep(i){

let steps=document.querySelectorAll(".step");

steps.forEach((s,idx)=>s.classList.toggle("active",idx===i));

document.getElementById("progress").innerText =
"Step " + i + "/4";

/* DOC */
if(i===1){
document.getElementById("doc").innerText =
mode==="case"
? "Completa dati mancanti e verifica coerenza"
: "Inserisci correttamente DSU/730";
}

/* CHECK */
if(i===2){

let err = [];

if(people.length<2) err.push("Nucleo incompleto");

if(mode==="case"){
err.push(currentCase.errori);
}

document.getElementById("check").innerHTML =
err.length ? "<span class='bad'>"+err.join("<br>")+"</span>"
: "<span class='good'>OK</span>";
}

/* ESITO */
if(i===3){

let red = people.reduce((a,b)=>a+b.reddito,0);
let pat = people.reduce((a,b)=>a+b.patrimonio,0);

let isee = (red + pat*0.2)/Math.max(1,people.length);

document.getElementById("out").innerText =
"ISEE simulato: € " + isee.toFixed(2);
}

}

/* =========================
   PERSONE
========================= */
function addPerson(){

people.push({
nome:nome.value,
ruolo:ruolo.value,
reddito:parseFloat(reddito.value)||0,
patrimonio:parseFloat(patrimonio.value)||0
});

render();
}

/* =========================
   RENDER
========================= */
function render(){

tab.innerHTML = people.map(p=>
`<tr>
<td>${p.nome}</td>
<td>${p.ruolo}</td>
<td>${p.reddito}</td>
<td>${p.patrimonio}</td>
</tr>`
).join("");
}

</script>

</body>
</html>
