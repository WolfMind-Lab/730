<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>CAF Trainer PRO MAX</title>

<style>
body { font-family: Arial; max-width:1000px; margin:auto; background:#f5f5f5; }
.card { background:white; padding:15px; margin-top:10px; border-radius:8px; }
input, select { width:100%; padding:6px; margin:4px 0; }
button { padding:10px; margin:5px; cursor:pointer; }

.step { display:none; }
.step.active { display:block; }

table { width:100%; border-collapse:collapse; margin-top:10px; }
th,td { border:1px solid #ccc; padding:6px; }

.bad { color:red; }
.good { color:green; }

.progress { font-weight:bold; margin-bottom:10px; }
</style>
</head>

<body>

<h1>🧾 CAF TRAINER PRO MAX</h1>
<p>Simulatore pratiche ISEE (DSU) + 730</p>

<div class="card">

<!-- AVVIO PRATICA -->
<div id="start">
<h2>📁 Nuova Pratica</h2>

<select id="tipo">
<option value="isee">ISEE (DSU)</option>
<option value="730">730</option>
</select>

<button onclick="start()">Crea pratica</button>
</div>

<!-- FLUSSO -->
<div id="flow" style="display:none">

<div class="progress" id="progress">Step 0 / 5</div>

<!-- STEP 1 -->
<div class="step active">
<h3>🟦 Anagrafica pratica</h3>
<input id="nomePratica" placeholder="Nome contribuente">
<input id="cf" placeholder="Codice fiscale">
<button onclick="next()">Avanti</button>
</div>

<!-- STEP 2 -->
<div class="step">
<h3>🟨 Nucleo familiare</h3>

<input id="nome" placeholder="Nome">
<select id="ruolo">
<option value="titolare">Titolare</option>
<option value="coniuge">Coniuge</option>
<option value="figlio">Figlio</option>
</select>

<input id="reddito" type="number" placeholder="Reddito">
<input id="patrimonio" type="number" placeholder="Patrimonio">

<button onclick="addPerson()">Aggiungi persona</button>

<table>
<thead>
<tr>
<th>Nome</th><th>Ruolo</th><th>Reddito</th><th>Patrimonio</th>
</tr>
</thead>
<tbody id="people"></tbody>
</table>

<button onclick="next()">Genera DSU</button>
</div>

<!-- STEP 3 DSU -->
<div class="step">
<h3>📄 DSU (Dichiarazione Sostitutiva Unica)</h3>

<div id="dsuView"></div>

<button onclick="next()">Calcola ISEE</button>
</div>

<!-- STEP 4 -->
<div class="step">
<h3>🧮 Elaborazione ISEE</h3>

<div id="calc"></div>

<button onclick="next()">Esito finale</button>
</div>

<!-- STEP 5 -->
<div class="step">
<h3>🟩 Esito finale</h3>

<h2 id="out"></h2>

</div>

</div>

</div>

<script>

/* =========================
   DATABASE
========================= */
let people = [];
let step = 0;
let tipo = "";
let dsu = {};

/* =========================
   START
========================= */
function start(){
tipo = document.getElementById("tipo").value;

document.getElementById("start").style.display = "none";
document.getElementById("flow").style.display = "block";

showStep(0);
}

/* =========================
   NAV
========================= */
function next(){
step++;
showStep(step);
}

/* =========================
   STEP ENGINE
========================= */
function showStep(i){

let steps = document.querySelectorAll(".step");
steps.forEach((s,idx)=>s.classList.toggle("active",idx===i));

document.getElementById("progress").innerText =
"Step " + i + " / 5";

/* =========================
   STEP 3 → DSU
========================= */
if(i===2){

buildDSU();

document.getElementById("dsuView").innerHTML = `
<b>📌 Quadro A - Nucleo familiare</b><br>
${dsu.nucleo.map(p=>p.nome + " ("+p.ruolo+")").join("<br>")}

<br><br>

<b>📌 Quadro FC1 - Redditi</b><br>
€ ${dsu.redditi.toFixed(2)}

<br><br>

<b>📌 Quadro FC2/FC3 - Patrimoni</b><br>
€ ${dsu.patrimoni.toFixed(2)}
`;
}

/* =========================
   STEP 4 → CALCOLO
========================= */
if(i===3){

let comp = dsu.nucleo.length;

let scala = 1;
if(comp==2) scala=1.57;
else if(comp==3) scala=2.04;
else if(comp==4) scala=2.46;
else if(comp>=5) scala=2.85;

let isee = (dsu.redditi + dsu.patrimoni*0.2) / scala;

document.getElementById("calc").innerHTML =
"Scala equivalenza: " + scala + "<br>" +
"Redditi: € " + dsu.redditi + "<br>" +
"Patrimoni: € " + dsu.patrimoni;
}

/* =========================
   ESITO
========================= */
if(i===4){

let comp = dsu.nucleo.length;

let scala = 1;
if(comp==2) scala=1.57;
else if(comp==3) scala=2.04;
else if(comp==4) scala=2.46;
else if(comp>=5) scala=2.85;

let isee = (dsu.redditi + dsu.patrimoni*0.2) / scala;

document.getElementById("out").innerText =
"ISEE CALCOLATO: € " + isee.toFixed(2);
}

}

/* =========================
   PERSONE
========================= */
function addPerson(){

people.push({
nome:nome.value,
ruolo:ruolo.value,
reddito:parseFloat(reddito.value)||0,
patrimonio:parseFloat(patrimonio.value)||0
});

render();
}

/* =========================
   DSU BUILDER
========================= */
function buildDSU(){

dsu.nucleo = people;

dsu.redditi = people.reduce((a,b)=>a+b.reddito,0);

dsu.patrimoni = people.reduce((a,b)=>a+b.patrimonio,0);
}

/* =========================
   RENDER
========================= */
function render(){

people.innerHTML = "";

document.getElementById("people").innerHTML =
people.map(p=>
`<tr>
<td>${p.nome}</td>
<td>${p.ruolo}</td>
<td>${p.reddito}</td>
<td>${p.patrimonio}</td>
</tr>`
).join("");
}

</script>

</body>
</html>
