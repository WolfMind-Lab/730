<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CAF Trainer - 730</title>

  <style>
    body { font-family: Arial; max-width: 900px; margin: auto; }

    .tabs { display: flex; margin-bottom: 10px; }

    .tab {
      flex: 1;
      padding: 10px;
      cursor: pointer;
      background: #eee;
      border: 1px solid #ccc;
      text-align: center;
    }

    .tab.active { background: #d4edda; font-weight: bold; }

    .section {
      display: none;
      border: 1px solid #ccc;
      padding: 15px;
    }

    .section.active { display: block; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🧾 CAF Trainer - Simulatore 730</h1>

<!-- TAB -->
<div class="tabs">
  <div class="tab active" onclick="showTab(0)">👤 Contribuente</div>
  <div class="tab" onclick="showTab(1)">💰 Redditi</div>
  <div class="tab" onclick="showTab(2)">📉 Spese</div>
  <div class="tab" onclick="showTab(3)">📊 Risultato</div>
</div>

<!-- 1 CONDIZIONE -->
<div class="section active">
  <h2>Contribuente</h2>

  <table>
    <tr>
      <th>Tipo lavoro</th>
      <td>
        <select id="tipo">
          <option value="dipendente">Dipendente</option>
          <option value="pensionato">Pensionato</option>
        </select>
      </td>
    </tr>

    <tr>
      <th>Familiari a carico</th>
      <td><input type="number" id="familiari" value="0"></td>
    </tr>
  </table>
</div>

<!-- 2 REDDITI -->
<div class="section">
  <h2>Redditi e ritenute</h2>

  <table>
    <tr>
      <th>Reddito da lavoro / pensione</th>
      <td><input type="number" id="reddito" value="0"></td>
    </tr>

    <tr>
      <th>IRPEF trattenuta</th>
      <td><input type="number" id="irpef" value="0"></td>
    </tr>
  </table>
</div>

<!-- 3 SPESE -->
<div class="section">
  <h2>Spese detraibili</h2>

  <table>
    <tr>
      <th>Spese mediche</th>
      <td><input type="number" id="mediche" value="0"></td>
    </tr>

    <tr>
      <th>Mutuo interessi</th>
      <td><input type="number" id="mutuo" value="0"></td>
    </tr>

    <tr>
      <th>Spese universitarie</th>
      <td><input type="number" id="uni" value="0"></td>
    </tr>
  </table>

  <button onclick="calcola730()">📊 Calcola 730</button>
</div>

<!-- 4 RISULTATO -->
<div class="section">
  <h2>Risultato 730</h2>

  <h3 id="risultato"></h3>

  <div id="analisi"></div>
</div>

<script>
function showTab(index) {
  let tabs = document.querySelectorAll(".tab");
  let sections = document.querySelectorAll(".section");

  tabs.forEach((t,i) => {
    t.classList.toggle("active", i === index);
    sections[i].classList.toggle("active", i === index);
  });
}

function calcola730() {

  let reddito = parseFloat(document.getElementById("reddito").value) || 0;
  let irpef = parseFloat(document.getElementById("irpef").value) || 0;

  let mediche = parseFloat(document.getElementById("mediche").value) || 0;
  let mutuo = parseFloat(document.getElementById("mutuo").value) || 0;
  let uni = parseFloat(document.getElementById("uni").value) || 0;

  let familiari = parseInt(document.getElementById("familiari").value) || 0;

  // DETRAZIONI SEMPLIFICATE (STUDIO)
  let detrazioni = (mediche * 0.19) + (mutuo * 0.19) + (uni * 0.19);

  let imposta = irpef - detrazioni;

  let risultato = "";

  if (imposta > 0) {
    risultato = "💸 Debito stimato: € " + imposta.toFixed(2);
  } else {
    risultato = "💰 Credito stimato: € " + Math.abs(imposta).toFixed(2);
  }

  document.getElementById("risultato").innerText = risultato;

  let note = "<ul>";

  if (familiari > 0)
    note += "<li>✔ Familiari a carico presenti</li>";

  if (mediche > 1000)
    note += "<li>✔ Spese mediche rilevanti</li>";

  if (mutuo > 0)
    note += "<li>✔ Detrazione interessi mutuo applicata</li>";

  note += "</ul>";

  document.getElementById("analisi").innerHTML = note;
}
</script>

</body>
</html>
